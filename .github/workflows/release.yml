name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Run tests
        run: |
          go test ./...
          go vet ./...

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%d)
          LDFLAGS="-s -w -X github.com/6547709/goct/internal/version.Version=${VERSION} -X github.com/6547709/goct/internal/version.Commit=${COMMIT} -X github.com/6547709/goct/internal/version.Date=${DATE}"

          mkdir -p dist

          # Linux amd64
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/goct-linux-amd64 .
          # Linux arm64
          GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/goct-linux-arm64 .
          # macOS amd64 (Intel)
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/goct-darwin-amd64 .
          # macOS arm64 (Apple Silicon)
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/goct-darwin-arm64 .
          # Windows amd64
          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/goct-windows-amd64.exe .

          # Generate checksums
          cd dist && sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/goct-linux-amd64
            dist/goct-linux-arm64
            dist/goct-darwin-amd64
            dist/goct-darwin-arm64
            dist/goct-windows-amd64.exe
            dist/checksums.txt
